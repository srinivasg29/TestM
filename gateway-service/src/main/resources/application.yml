server:
  port: 8080

spring:
  application:
    name: gateway-service
  datasource:
    url: jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics

account-service:
  base-url: http://localhost:8081
